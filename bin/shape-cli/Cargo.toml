[package]
name = "shape-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI and REPL for the Shape programming language"



[features]
default = ["jit"]
jit = ["shape-jit", "shape-vm/jit"]  # Enable JIT in both the JIT crate and VM tiered compilation
# Cluster-2 closure-wave-F (2026-05-16): when enabled, the `--trace-jit`
# CLI flag installs a tracing-subscriber filtering on `shape_jit` /
# `shape_jit::*` targets. Feature-off builds compile away both the
# subscriber init and the macros (via `release_max_level_off` on the
# shape-jit / shape-vm side).
jit-trace = [
    "shape-jit/jit-trace",
    "shape-vm/jit-trace",
    "dep:tracing",
    "dep:tracing-subscriber",
]

[dependencies]
anyhow.workspace = true
shape-ast = { workspace = true }
shape-runtime = { workspace = true }
shape-wire = { workspace = true }
shape-jit = { workspace = true, optional = true }
shape-vm = { workspace = true }
dirs = "5.0"
hex = "0.4"
rustyline = "12.0"
serde_json.workspace = true
serde.workspace = true
toml = "0.8"
tokio.workspace = true
regex = "1.11"
once_cell = "1.19"
env_logger.workspace = true
shape-viz-core = { workspace = true }
chrono.workspace = true
image.workspace = true
base64 = "0.21"
clap = { version = "4", features = ["derive"] }
ctrlc = "3"
indicatif = "0.17"
libloading = "0.8"
reqwest = { workspace = true, features = ["multipart"] }
rpassword = "5"
tempfile = "3.24"
flate2 = "1"
tar = "0.4"

# Cluster-2 closure-wave-F (2026-05-16): tracing-subscriber for the
# `--trace-jit` CLI flag. Optional deps under the `jit-trace` feature; the
# default build pulls in neither, keeping shape-cli's dependency surface
# unchanged for users who don't opt into JIT diagnostics. See ADR-006 §2.7.5.
tracing = { version = "0.1", default-features = false, features = ["std"], optional = true }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "env-filter"], optional = true }

# TUI REPL dependencies
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
tui-textarea = "0.7"

[dev-dependencies]
tempfile = "3.24"
shape-wire = { workspace = true }
assert_cmd = "2.0"
predicates = "3.1"

[[bin]]
name = "shape"
path = "src/main.rs"
