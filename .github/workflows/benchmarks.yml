name: Performance Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: |
          cargo bench --bench vm_benchmarks -- --save-baseline pr --output-format bencher 2>&1 | tee benchmark-output.txt

      - name: JIT perf regression gate
        run: cargo run -p xtask -- perf-regression-gate
        continue-on-error: true  # Advisory — failures visible as yellow in CI. Enforce once ratios < 1.0x Node.

      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          python3 ci/check_regressions.py --threshold 10

      - name: Store baseline (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          cargo bench --bench vm_benchmarks -- --save-baseline main
