# Shape AI Configuration
#
# This file configures AI-powered features for Shape, including
# LLM-based strategy generation and optimization.

[llm]
# Provider: "openai", "anthropic", "deepseek", or "ollama"
provider = "anthropic"

# Model name
# - OpenAI: "gpt-4", "gpt-4-turbo", "gpt-3.5-turbo"
# - Anthropic: "claude-sonnet-4", "claude-opus-4", "claude-3-5-sonnet-20241022"
# - DeepSeek: "deepseek-chat", "deepseek-coder"
# - Ollama: "llama3", "mistral", "codellama", etc.
model = "claude-sonnet-4"

# API key (optional - will use environment variable if not set)
# For OpenAI: set OPENAI_API_KEY
# For Anthropic: set ANTHROPIC_API_KEY
# For DeepSeek: set DEEPSEEK_API_KEY
# For Ollama: no API key needed
# api_key = "your-key-here"

# Custom API base URL (optional)
# api_base = "https://custom-endpoint.com/v1"

# Maximum tokens to generate
max_tokens = 4096

# Temperature (0.0 = deterministic, 2.0 = very creative)
temperature = 0.7

# Top-p sampling (optional, 0.0 to 1.0)
# top_p = 0.9

[generation]
# Number of retry attempts if generation fails
retry_attempts = 3

# Timeout for each generation attempt (seconds)
timeout_seconds = 60

# Validate generated code before returning
validate_code = true

# Example configurations for different providers:

# [llm]
# provider = "openai"
# model = "gpt-4-turbo"
# # Set OPENAI_API_KEY environment variable

# [llm]
# provider = "deepseek"
# model = "deepseek-chat"
# # Set DEEPSEEK_API_KEY environment variable

# [llm]
# provider = "ollama"
# model = "llama3"
# api_base = "http://localhost:11434"
# # Run: ollama serve (in another terminal)
