syntax = "proto3";
package shape;

// Shape Core Service - provides query execution and backtesting
service ShapeService {
  // Session management
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc DestroySession(DestroySessionRequest) returns (DestroySessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Query execution
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc ExecuteStream(ExecuteRequest) returns (stream ExecuteChunk);

  // Backtesting
  rpc Backtest(BacktestRequest) returns (BacktestResponse);
  rpc BacktestStream(BacktestRequest) returns (stream BacktestProgress);

  // Shutdown
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

// Session Messages
message CreateSessionRequest {
  optional string name = 1;
  bool load_stdlib = 2;
}

message CreateSessionResponse {
  string session_id = 1;
  bool stdlib_loaded = 2;
}

message DestroySessionRequest {
  string session_id = 1;
}

message DestroySessionResponse {
  bool success = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id = 1;
  string name = 2;
  int64 created_at = 3;
  int64 last_activity = 4;
  uint64 command_count = 5;
}

// Execution Messages
message ExecuteRequest {
  string session_id = 1;
  string code = 2;
  optional string output_format = 3;  // json, table, summary
}

message ExecuteResponse {
  bool success = 1;
  string result_json = 2;
  string execution_type = 3;
  ExecutionMetrics metrics = 4;
  repeated Message messages = 5;
  optional string error = 6;
}

message ExecuteChunk {
  oneof chunk {
    string output = 1;
    ExecuteResponse final_result = 2;
  }
}

message ExecutionMetrics {
  uint64 parse_time_us = 1;
  uint64 semantic_time_us = 2;
  uint64 execution_time_us = 3;
  uint64 total_time_us = 4;
  uint64 candles_processed = 5;
  uint64 patterns_matched = 6;
}

message Message {
  string level = 1;  // info, warning, error
  string text = 2;
}

// Backtest Messages
message BacktestRequest {
  string session_id = 1;
  string strategy_code = 2;
  string symbol = 3;
  optional TimeRange range = 4;
  optional BacktestConfig config = 5;
}

message TimeRange {
  int64 start_timestamp = 1;
  int64 end_timestamp = 2;
}

message BacktestConfig {
  double initial_capital = 1;
  double risk_per_trade = 2;
  int32 max_positions = 3;
  double commission = 4;
  double slippage = 5;
}

message BacktestResponse {
  bool success = 1;
  BacktestSummary summary = 2;
  string trades_json = 3;
  string equity_json = 4;
  optional string error = 5;
}

message BacktestSummary {
  double total_return = 1;
  double annualized_return = 2;
  double sharpe_ratio = 3;
  double sortino_ratio = 4;
  double max_drawdown = 5;
  double win_rate = 6;
  double profit_factor = 7;
  uint64 total_trades = 8;
  double avg_trade_duration = 9;
}

message BacktestProgress {
  float progress = 1;
  uint64 candles_processed = 2;
  uint64 total_candles = 3;
  string status = 4;
  optional BacktestResponse result = 5;
}

// Shutdown Messages
message ShutdownRequest {
  bool force = 1;
}

message ShutdownResponse {
  bool success = 1;
  uint32 active_sessions = 2;
}
